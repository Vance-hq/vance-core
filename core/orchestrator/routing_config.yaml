  # ---------------------------------------------------------------------------

  - agent: integrations
    action: call_service
    description: Pull QuickBooks profit and loss report
    priority: NORMAL
    default_args: {service: quickbooks, method: get_profit_loss}
    patterns:
      - "quickbooks"
      - "p&l"
      - "profit and loss"
      - "expenses"
      - "accounting report"
      - "quickbooks report"
      - "show p and l"
      - "financial report"
      - "books report"

  - agent: integrations
    action: call_service
    description: List Square POS transactions
    priority: NORMAL
    default_args: {service: square, method: list_transactions}
    patterns:
      - "square sales"
      - "pos report"
      - "trusted plumbing revenue"
      - "square transactions"
      - "pos sales"
      - "square revenue"
      - "point of sale report"

  # ---------------------------------------------------------------------------
  # INTEGRATIONS — Google
  # ---------------------------------------------------------------------------

  - agent: integrations
    action: call_service
    description: Pull GA4 session and traffic data
    priority: NORMAL
    default_args: {service: google_analytics, method: get_sessions}
    patterns:
      - "google analytics"
      - "site traffic"
      - "how many visitors"
      - "website stats"
      - "ga4 report"
      - "traffic report"
      - "sessions today"
      - "how much traffic"
      - "website visitors"

  - agent: integrations
    action: call_service
    description: Get Google Ads campaign performance metrics
    priority: NORMAL
    default_args: {service: google_ads, method: get_performance}
    patterns:
      - "check google ads"
      - "ads performance"
      - "how are the google ads doing"
      - "google ads report"
      - "ads metrics"
      - "campaign performance"
      - "google ads stats"
      - "how are the ads doing"

  - agent: integrations
    action: call_service
    description: Update or post to Google Business Profile
    priority: NORMAL
    default_args: {service: google_business_profile, method: create_post}
    patterns:
      - "update gbp"
      - "update the listing"
      - "post to google"
      - "google business update"
      - "gbp post"
      - "update google listing"
      - "post to google business"
      - "google my business update"

  # ---------------------------------------------------------------------------
  # INTEGRATIONS — CRM (Twenty)
  # ---------------------------------------------------------------------------

  - agent: integrations
    action: call_service
    description: Search for a contact in Twenty CRM
    priority: NORMAL
    default_args: {service: twenty_crm, method: list_contacts}
    patterns:
      - "look up contact"
      - "find contact"
      - "who is"
      - "contact info"
      - "search crm"
      - "find in crm"
      - "look up in crm"
      - "crm lookup"
      - "find the contact"

  - agent: integrations
    action: call_service
    description: Create a new contact in Twenty CRM
    priority: NORMAL
    default_args: {service: twenty_crm, method: create_contact}
    patterns:
      - "add contact"
      - "new contact"
      - "add to crm"
      - "create contact"
      - "add them to crm"
      - "put in crm"
      - "add to twenty"
      - "save contact to crm"

  # ---------------------------------------------------------------------------
  # VANCE SYSTEM — meta-commands
  # ---------------------------------------------------------------------------

  - agent: vance_system
    action: status
    description: Report current system status and queue depth
    priority: NORMAL
    patterns:
      - "what's the status"
      - "status update"
      - "how are things"
      - "what's running"
      - "system status"
      - "what are you doing"
      - "what's queued"
      - "show status"
      - "give me a status"

  - agent: vance_system
    action: unknown
    description: Fallback when no intent can be determined
    priority: NORMAL
    patterns: []
