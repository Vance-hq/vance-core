      - "post to slack"
      - "send slack"
      - "slack this"
      - "message slack"
      - "post in slack"
      - "drop in slack"
      - "ping slack"

  - agent: integrations
    action: call_service
    description: Check upcoming Calendly scheduled events
    priority: NORMAL
    default_args: {service: calendly, method: get_scheduled_events}
    patterns:
      - "what's on my calendar"
      - "upcoming meetings"
      - "my calendly"
      - "check my calendar"
      - "what do i have scheduled"
      - "show my meetings"
      - "calendly schedule"
      - "what meetings do i have"

  # ---------------------------------------------------------------------------
