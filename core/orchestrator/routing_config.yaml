# Orchestrator routing config.
# Add new intents here — no Python changes required.
#
# Fields per entry:
#   agent:       target agent name
#   action:      action to invoke on that agent
#   description: human-readable summary
#   priority:    CRITICAL | HIGH | NORMAL | LOW
#   patterns:    list of phrase fragments — fuzzy-matched against raw_text
#   fan_out:     optional list of {agent, action, priority} to also dispatch
#
# Priority semantics: CRITICAL=1, HIGH=3, NORMAL=5, LOW=8

intents:

  # ---------------------------------------------------------------------------
  # MARKETING
  # ---------------------------------------------------------------------------

  - agent: marketing
    action: generate_copy
    description: Generate direct-response copy for a product or campaign
    priority: NORMAL
    patterns:
      - "write copy"
      - "create copy"
      - "generate copy"
      - "draft copy"
      - "write marketing"
      - "write ad"
      - "create ad copy"
      - "write some copy"
      - "need copy for"

  - agent: marketing
    action: build_sequence
    description: Build a multi-step email drip sequence
    priority: NORMAL
    patterns:
      - "build sequence"
      - "email sequence"
      - "drip sequence"
      - "drip campaign"
      - "nurture sequence"
      - "create drip"
      - "build drip"
      - "follow up sequence"
      - "email drip"

  - agent: marketing
    action: create_campaign
    description: Scaffold a full marketing campaign
    priority: HIGH
    patterns:
      - "create campaign"
      - "launch campaign"
      - "new campaign"
      - "start campaign"
