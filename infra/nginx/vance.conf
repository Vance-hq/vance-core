# Vance Nginx configuration
# Managed by: /home/vance/vance/infra/nginx/vance.conf
# SSL certificates: Let's Encrypt via certbot
#
# Deployment:
#   sudo ln -s /home/vance/vance/infra/nginx/vance.conf /etc/nginx/sites-enabled/vance
#   sudo nginx -t && sudo systemctl reload nginx

# ---------------------------------------------------------------------------
# Rate limit zones
# ---------------------------------------------------------------------------

# /api/ — WireGuard-only, 10 req/min per client IP
limit_req_zone $binary_remote_addr zone=vance_api:10m rate=10r/m;

# /hooks/ — public-facing, 30 req/min per client IP
limit_req_zone $binary_remote_addr zone=vance_hooks:10m rate=30r/m;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (public interface)
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Webhooks — public HTTPS (Mailcow reply callbacks, Stripe events)
# ---------------------------------------------------------------------------

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_HERE;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Only the /hooks/ path is public
    location /hooks/ {
        limit_req zone=vance_hooks burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # All other paths return 404 on the public interface
    location / {
        return 404;
    }
}

# ---------------------------------------------------------------------------
# API — WireGuard-only (binds to 10.99.0.1, not the public NIC)
# ---------------------------------------------------------------------------

server {
    # Listen only on the WireGuard interface — never exposed to the public internet
    listen 10.99.0.1:443 ssl;
    server_name 10.99.0.1;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
        limit_req zone=vance_api burst=5 nodelay;
        limit_req_status 429;

        # Strip the /api prefix before forwarding to the orchestrator
        rewrite ^/api/(.*) /$1 break;

        proxy_pass         http://orchestrator:7700;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}
