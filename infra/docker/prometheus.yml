global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Container metrics from cAdvisor (Docker stats for all services)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
