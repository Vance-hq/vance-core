  localrankgrader:
    <<: *agent-base
    build:
      context: ../..
      dockerfile: agents/localrankgrader/Dockerfile
    mem_limit: 256m
    environment:
      AGENT_NAME: localrankgrader

  integrations:
    <<: *agent-base
    build:
      context: ../..
      dockerfile: agents/integrations/Dockerfile
    mem_limit: 256m
    environment:
      AGENT_NAME: integrations
